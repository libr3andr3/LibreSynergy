name: LibreSynergy CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install click jinja2 pyyaml fastapi uvicorn sqlalchemy httpx python-jose pydantic pytest

      - name: Run tests
        run: |
          PYTHONPATH=. python -m pytest tests/ -v --tb=short

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: pip install click jinja2 pyyaml

      - name: Generate compose and validate
        run: |
          PYTHONPATH=. python -c "
          from cli.main import cli
          from click.testing import CliRunner
          import tempfile, subprocess, os
          tmp = tempfile.mkdtemp()
          runner = CliRunner()
          r = runner.invoke(cli, ['bootstrap', '--domain', 'ci.example.org', '--output', tmp, '--non-interactive'])
          assert r.exit_code == 0, f'Bootstrap failed: {r.output}'
          # Validate via docker compose
          proc = subprocess.run(['docker', 'compose', '-f', os.path.join(tmp, 'docker-compose.yml'), 'config', '--services'],
              capture_output=True, text=True)
          assert proc.returncode == 0, f'Compose validation failed: {proc.stderr}'
          services = proc.stdout.strip().split()
          assert len(services) == 13, f'Expected 13 services, got {len(services)}'
          print(f'✓ {len(services)} services validated')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check syntax
        run: |
          find . -name '*.py' -not -path './.venv/*' -not -path './tests/*' -print0 | xargs -0 python -m py_compile
